<div class="settings-page">
  <header class="settings-page__header">
    <h1 class="settings-page__title">Настройки</h1>
    <p class="settings-page__subtitle">Оформление и базовые предпочтения интерфейса.</p>
  </header>

  <section class="settings-page__card card">
    <div class="settings-page__row">
      <div>
        <div class="settings-page__label">Тема</div>
        <div class="settings-page__hint">Переключение между светлым и тёмным режимом</div>
      </div>

      <div class="settings-page__switch">
        <button class="btn" [class.primary]="current === 'dark'" (click)="set('dark')">Тёмная</button>
        <button class="btn" [class.primary]="current === 'light'" (click)="set('light')">Светлая</button>
      </div>
    </div>
  </section>
</div>
