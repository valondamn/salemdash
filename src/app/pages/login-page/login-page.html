<div class="login-page">
  <div class="login-page__card card">
    <div class="login-page__head">
      <h1 class="login-page__title">Вход в систему</h1>
      <p class="login-page__subtitle">Используйте свой аккаунт, чтобы открыть панель управления.</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()" class="login-page__form">
      <label class="login-page__field">
        <span class="login-page__label">Почта</span>
        <input class="login-page__input" type="email" formControlName="email" placeholder="почта@пример.рф" />
        <small class="login-page__error" *ngIf="form.controls.email.touched && form.controls.email.invalid">
          Введите корректную почту
        </small>
      </label>

      <label class="login-page__field">
        <span class="login-page__label">Пароль</span>

        <div class="login-page__password">
          <input
            class="login-page__input"
            [type]="showPassword ? 'text' : 'password'"
            formControlName="password"
            placeholder="••••••••"
          />
          <button type="button" class="login-page__ghost" (click)="showPassword = !showPassword">
            {{ showPassword ? 'Скрыть' : 'Показать' }}
          </button>
        </div>

        <small class="login-page__error" *ngIf="form.controls.password.touched && form.controls.password.invalid">
          Минимум 6 символов
        </small>
      </label>

      <div class="login-page__notice" *ngIf="error">{{ error }}</div>

      <button class="btn login-page__submit primary" type="submit" [disabled]="loading">
        <span *ngIf="!loading">Войти</span>
        <span *ngIf="loading">Входим...</span>
      </button>
    </form>
  </div>
</div>
