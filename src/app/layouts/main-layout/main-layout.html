<div class="main-layout">
  <div class="ambient-orbs" aria-hidden="true">
    <div class="ambient-orb ambient-orb--1"></div>
    <div class="ambient-orb ambient-orb--2"></div>
    <div class="ambient-orb ambient-orb--3"></div>
    <div class="ambient-orb ambient-orb--4"></div>
  </div>

  <aside class="main-layout__sidebar">
    <div class="main-layout__brand">
      <span class="main-layout__brand-logo">S</span>
      <span class="main-layout__brand-name">Salem</span>
    </div>
    <app-tabs class="main-layout__tabs" [tabs]="tabs"></app-tabs>
    <button class="btn main-layout__logout" (click)="logout()">Выйти</button>
  </aside>

  <div class="main-layout__content">
    <header class="main-layout__topbar">
      <div class="main-layout__title">Salem</div>

      <div class="main-layout__actions">
        @if (currentUser; as user) {
          <div class="main-layout__user-chip">
            <span class="main-layout__user-name">{{ user.login }}</span>
            <span class="main-layout__user-role">{{ user.role }}</span>
          </div>
        }
      </div>
    </header>

    <main class="main-layout__page">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
