<div class="page">
  <div class="head">
    <h1>Settings</h1>
    <p class="muted">Appearance & preferences</p>
  </div>

  <section class="card panel">
    <div class="row">
      <div>
        <div class="label">Theme</div>
        <div class="muted">Switch between dark and light</div>
      </div>

      <div class="switch">
        <button class="btn" [class.primary]="current === 'dark'" (click)="set('dark')">Dark</button>
        <button class="btn" [class.primary]="current === 'light'" (click)="set('light')">Light</button>
      </div>
    </div>
  </section>
</div>
