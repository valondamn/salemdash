<div class="stats-page page">
  <section class="hero card">
    <div class="hero-copy">
      <h1>Статистика</h1>
    </div>

    <div class="hero-actions">
      <div class="top-tabs source-tabs">
        <button class="tab" [class.active]="activeSource === 'youtube'" (click)="setSource('youtube')">YouTube</button>
        <button class="tab" [class.active]="activeSource === 'yandex'" (click)="setSource('yandex')">Яндекс</button>
        <button class="tab" [class.active]="activeSource === 'instagram'" (click)="setSource('instagram')">Instagram</button>
        <button class="tab" [class.active]="activeSource === 'tiktok'" (click)="setSource('tiktok')">TikTok</button>
      </div>

      <div class="top-tabs">
        <button class="tab" [class.active]="mode === 'single'" (click)="setMode('single')">Один набор</button>
        <button class="tab" [class.active]="mode === 'compare'" (click)="setMode('compare')">Сравнение</button>
      </div>
    </div>
  </section>

  <section class="control-card card">
    <div class="control-head">
      <div>
        <div class="section-title">{{ mode === 'compare' ? 'Сравнение' : 'Данные' }}</div>
      </div>

      <button class="btn accent-btn" (click)="onRefresh()" [disabled]="currentLoading || loadingProjects">
        {{ currentLoading || loadingProjects ? 'Обновляем...' : 'Обновить данные' }}
      </button>
    </div>

    <div class="control-grid" *ngIf="activeSource === 'youtube' && mode === 'single'">
      <label class="control-item">
        <span class="control-label">Проект</span>
        <select class="select compact-select" [(ngModel)]="selectedProjectId" (change)="onProjectChange()">
          <option value="" disabled>{{ loadingProjects ? 'Загружаем проекты...' : 'Выберите проект...' }}</option>
          <option *ngFor="let p of projects" [value]="p.id">
            {{ p.name || p.utm_name || ('Проект ' + p.id) }}
          </option>
        </select>
      </label>
    </div>

    <div class="control-grid compare-grid" *ngIf="activeSource === 'youtube' && mode === 'compare'">
      <label class="control-item">
        <span class="control-label">Проект A</span>
        <select class="select compact-select accent-a" [(ngModel)]="projectAId" (change)="onCompareProjectsChange()">
          <option value="" disabled>{{ loadingProjects ? 'Загружаем проекты...' : 'Проект A...' }}</option>
          <option *ngFor="let p of projects" [value]="p.id">
            {{ p.name || p.utm_name || ('Проект ' + p.id) }}
          </option>
        </select>
      </label>

      <label class="control-item">
        <span class="control-label">Проект B</span>
        <select class="select compact-select accent-b" [(ngModel)]="projectBId" (change)="onCompareProjectsChange()">
          <option value="" disabled>{{ loadingProjects ? 'Загружаем проекты...' : 'Проект B...' }}</option>
          <option *ngFor="let p of projects" [value]="p.id">
            {{ p.name || p.utm_name || ('Проект ' + p.id) }}
          </option>
        </select>
      </label>
    </div>

    <div class="control-grid" *ngIf="activeSource === 'yandex' && mode === 'single'">
      <label class="control-item">
        <span class="control-label">Проект</span>
        <select class="select compact-select" [(ngModel)]="yandexProjectId" (change)="onYandexProjectChange()">
          <option value="" disabled>{{ loadingProjects ? 'Загружаем проекты...' : 'Выберите проект...' }}</option>
          <option *ngFor="let p of projects" [value]="p.id">
            {{ p.name || p.utm_name || ('Проект ' + p.id) }}
          </option>
        </select>
      </label>
    </div>

    <div class="control-grid compare-grid" *ngIf="activeSource === 'yandex' && mode === 'compare'">
      <label class="control-item">
        <span class="control-label">Проект A</span>
        <select class="select compact-select accent-a" [(ngModel)]="yandexProjectAId" (change)="onCompareYandexProjectsChange()">
          <option value="" disabled>{{ loadingProjects ? 'Загружаем проекты...' : 'Проект A...' }}</option>
          <option *ngFor="let p of projects" [value]="p.id">
            {{ p.name || p.utm_name || ('Проект ' + p.id) }}
          </option>
        </select>
      </label>

      <label class="control-item">
        <span class="control-label">Проект B</span>
        <select class="select compact-select accent-b" [(ngModel)]="yandexProjectBId" (change)="onCompareYandexProjectsChange()">
          <option value="" disabled>{{ loadingProjects ? 'Загружаем проекты...' : 'Проект B...' }}</option>
          <option *ngFor="let p of projects" [value]="p.id">
            {{ p.name || p.utm_name || ('Проект ' + p.id) }}
          </option>
        </select>
      </label>
    </div>

    <div class="control-grid" *ngIf="activeSource === 'tiktok' && mode === 'single'">
      <label class="control-item">
        <span class="control-label">TikTok аккаунт</span>
        <select class="select compact-select" [(ngModel)]="tiktokSingleId">
          <option value="" disabled>Выберите аккаунт...</option>
          <option *ngFor="let acc of tiktokAccounts" [value]="acc.account_id">
            {{ acc.channel_name }}
          </option>
        </select>
      </label>
    </div>

    <div class="control-grid compare-grid" *ngIf="activeSource === 'tiktok' && mode === 'compare'">
      <label class="control-item">
        <span class="control-label">Аккаунт A</span>
        <select class="select compact-select accent-a" [(ngModel)]="tiktokCompareAId">
          <option value="" disabled>Аккаунт A...</option>
          <option *ngFor="let acc of tiktokAccounts" [value]="acc.account_id">
            {{ acc.channel_name }}
          </option>
        </select>
      </label>

      <label class="control-item">
        <span class="control-label">Аккаунт B</span>
        <select class="select compact-select accent-b" [(ngModel)]="tiktokCompareBId">
          <option value="" disabled>Аккаунт B...</option>
          <option *ngFor="let acc of tiktokAccounts" [value]="acc.account_id">
            {{ acc.channel_name }}
          </option>
        </select>
      </label>
    </div>

    <div class="control-grid" *ngIf="activeSource === 'instagram' && mode === 'single'">
      <label class="control-item">
        <span class="control-label">Instagram аккаунт</span>
        <select class="select compact-select" [(ngModel)]="selectedInstagramId">
          <option value="" disabled>Выберите аккаунт...</option>
          <option *ngFor="let account of instagramAccounts" [value]="account.id">
            {{ account.page_name }} (@{{ account.username }})
          </option>
        </select>
      </label>
    </div>

    <div class="control-grid compare-grid" *ngIf="activeSource === 'instagram' && mode === 'compare'">
      <label class="control-item">
        <span class="control-label">Аккаунт A</span>
        <select class="select compact-select accent-a" [(ngModel)]="instagramAId">
          <option value="" disabled>Аккаунт A...</option>
          <option *ngFor="let account of instagramAccounts" [value]="account.id">
            {{ account.page_name }} (@{{ account.username }})
          </option>
        </select>
      </label>

      <label class="control-item">
        <span class="control-label">Аккаунт B</span>
        <select class="select compact-select accent-b" [(ngModel)]="instagramBId">
          <option value="" disabled>Аккаунт B...</option>
          <option *ngFor="let account of instagramAccounts" [value]="account.id">
            {{ account.page_name }} (@{{ account.username }})
          </option>
        </select>
      </label>
    </div>
  </section>

  <div class="errbox" *ngIf="error">{{ error }}</div>

  <section class="sync-banner card" *ngIf="currentLoading || loadingProjects">
    <div class="sync-banner__dot"></div>
    <div>
      <div class="sync-banner__title">Данные обновляются</div>
      <p class="sync-banner__copy">{{ getLoadingMessage() }}</p>
    </div>
  </section>

  <section class="loading-skeleton card" *ngIf="isLoadingWithoutVisibleData">
    <div class="loading-skeleton__head"></div>
    <div class="loading-skeleton__grid">
      <div class="loading-skeleton__stat" *ngFor="let _ of [1, 2, 3, 4]"></div>
    </div>
    <div class="loading-skeleton__panel"></div>
  </section>

  <section
    class="analytics-empty card"
    *ngIf="
      !loadingInfo &&
      !loadingProjects &&
      !loadingTiktok &&
      (
        (activeSource === 'youtube' && mode === 'single' && !hasYoutubeSingleData) ||
        (activeSource === 'youtube' && mode === 'compare' && !hasYoutubeCompareData) ||
        (activeSource === 'yandex' && !hasYandexData) ||
        (activeSource === 'instagram' && !hasInstagramData) ||
        (activeSource === 'tiktok' && mode === 'single' && !hasTikTokData) ||
        (activeSource === 'tiktok' && mode === 'compare' && !hasTikTokCompareData)
      )
    "
  >
    <div class="analytics-empty__title">{{ getEmptyStateTitle() }}</div>
    <p class="analytics-empty__copy">{{ getEmptyStateCopy() }}</p>
  </section>

  <app-youtube-single-stats
    *ngIf="activeSource === 'youtube' && mode === 'single' && hasYoutubeSingleData"
    [headline]="getSingleHeadline()"
    [episodes]="episodes"
    [totalViews]="totalViews"
    [totalLikes]="totalLikes"
    [totalComments]="totalComments"
    [avgViews]="avgViews"
    [engagementRate]="engagementRate"
    [topEpisodes]="topEpisodes"
    [loadingInfo]="loadingInfo"
  ></app-youtube-single-stats>

  <app-youtube-compare-stats
    *ngIf="activeSource === 'youtube' && mode === 'compare' && hasYoutubeCompareData"
    [rows]="youtubeCompareRows"
    [labels]="youtubeCompareLabels"
    [viewSeriesA]="youtubeViewSeriesA"
    [viewSeriesB]="youtubeViewSeriesB"
    [engagementSeriesA]="youtubeEngagementSeriesA"
    [engagementSeriesB]="youtubeEngagementSeriesB"
    [primaryLabel]="getComparePrimaryLabel()"
    [secondaryLabel]="getCompareSecondaryLabel()"
    [summary]="getCompareSummary(youtubeCompareRows, getComparePrimaryLabel(), getCompareSecondaryLabel())"
  ></app-youtube-compare-stats>

  <app-yandex-single-stats
    *ngIf="activeSource === 'yandex' && mode === 'single' && hasYandexData"
    [headline]="getSingleHeadline()"
    [projectName]="yandexSingle?.project_name || ''"
    [totalCount]="yandexSingle?.total_count || 0"
    [totalKzCount]="yandexSingle?.total_kz_count || 0"
    [urlCount]="yandexSingle?.url_count || 0"
    [items]="yandexSingle?.items || []"
  ></app-yandex-single-stats>

  <app-yandex-compare-stats
    *ngIf="activeSource === 'yandex' && mode === 'compare' && hasYandexData"
    [rows]="yandexCompareRows"
    [labels]="yandexCompareLabels"
    [totalSeriesA]="yandexTotalSeriesA"
    [totalSeriesB]="yandexTotalSeriesB"
    [kzSeriesA]="yandexKzSeriesA"
    [kzSeriesB]="yandexKzSeriesB"
    [primaryLabel]="getComparePrimaryLabel()"
    [secondaryLabel]="getCompareSecondaryLabel()"
    [summary]="getCompareSummary(yandexCompareRows, getComparePrimaryLabel(), getCompareSecondaryLabel())"
  ></app-yandex-compare-stats>

  <app-instagram-single-stats
    *ngIf="activeSource === 'instagram' && mode === 'single' && hasInstagramData && selectedInstagramAccount as account"
    [headline]="getSingleHeadline()"
    [account]="account"
  ></app-instagram-single-stats>

  <app-instagram-compare-stats
    *ngIf="activeSource === 'instagram' && mode === 'compare' && hasInstagramData"
    [rows]="instagramCompareRows"
    [accountA]="instagramAccountA"
    [accountB]="instagramAccountB"
    [perPostLabels]="instagramPerPostLabels"
    [perPostSeriesA]="instagramPerPostSeriesA"
    [perPostSeriesB]="instagramPerPostSeriesB"
    [primaryLabel]="getComparePrimaryLabel()"
    [secondaryLabel]="getCompareSecondaryLabel()"
    [summary]="getCompareSummary(instagramCompareRows, getComparePrimaryLabel(), getCompareSecondaryLabel())"
  ></app-instagram-compare-stats>

  <app-tiktok-single-stats
    *ngIf="activeSource === 'tiktok' && mode === 'single' && hasTikTokData && tiktokTotal"
    [total]="tiktokTotal"
    [accounts]="tiktokAccounts"
  ></app-tiktok-single-stats>

  <app-tiktok-compare-stats
    *ngIf="activeSource === 'tiktok' && mode === 'compare' && hasTikTokCompareData"
    [rows]="tiktokCompareRows"
    [accountA]="tiktokCompareAccountA"
    [accountB]="tiktokCompareAccountB"
    [primaryLabel]="getTikTokComparePrimaryLabel()"
    [secondaryLabel]="getTikTokCompareSecondaryLabel()"
    [summary]="getCompareSummary(tiktokCompareRows, getTikTokComparePrimaryLabel(), getTikTokCompareSecondaryLabel())"
  ></app-tiktok-compare-stats>
</div>
